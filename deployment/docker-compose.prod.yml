services:
  zero:
    image: rocicorp/zero
    container_name: zero-server
    expose:
      - '4848'
    env_file:
      - .env.prod
    volumes:
      - ../src/lib/db/zero/zero-schema.ts:/app/zero-schema.ts:ro
      - zero_data:/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:4848']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - zero_network

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    restart: unless-stopped
    depends_on:
      zero:
        condition: service_healthy
    networks:
      - zero_network

  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    command: certonly --webroot --webroot-path=/var/www/certbot --email ${CERTBOT_EMAIL} --agree-tos --no-eff-email -d ${ZERO_DOMAIN}

networks:
  zero_network:
    driver: bridge
    enable_ipv6: true
    ipam:
      config:
        - subnet: 172.20.0.0/16
        - subnet: 2001:db8:2::/64

volumes:
  zero_data:
  certbot_conf:
  certbot_www:
